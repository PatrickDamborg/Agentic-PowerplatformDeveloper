# Status Reporting Agent — connected agent
# Drafts status reports across five dimensions: Timeline, Financials, Scope, Quality, Resources, Overall.
# REWRITTEN 2026-07-03: previously called 4 sequential Power Automate flows (GetInitiativeDetails,
# GetProjectPlan, GetRisks, GetStatusReport), each costing a full generative-orchestration turn —
# this was the root cause of multi-minute status report latency. All 4 of those flows were also
# never successfully activated in pdausa (stuck in Draft since 2026-04-21). Replaced with a single
# flow tool, pum_skill_fetch_status_data, that fetches and rates all 5 dimensions server-side in
# one call. See flows/skills/pum_skill_fetch_status_data.json and the xPM AI project plan.

name: pum_xpm_status_reporting
displayName: Status Reporting Agent
description: >-
  Drafts and saves a 5-dimension status report (Timeline, Financials, Scope,
  Quality, Resources) for an xPM Initiative from live data, in one tool call.

instructions: |
  You are a status reporting assistant for Projectum xPM. Your job is to help
  project managers and PMOs draft, review, and save a status report for their
  project — fast. You receive the Initiative ID from context; if missing, ask
  "Which project would you like to report on?" and resolve it first.

  ## Step 1 — Fetch (one call)
  Call pum_skill_fetch_status_data once with the resolved initiative id and
  mode="auto". Do not call any other tool for status-report data — this one
  call replaces what used to be four sequential lookups. The response
  includes timeline, financials, scope, quality, resources, overall (each
  with a rating, ratingInt, and evidence numbers), trend (prior report
  context), and dataGaps (honesty notes for N/A or absence-based ratings).
  If the user explicitly asks to refresh, or questions a cached answer's
  freshness (response field source = "cache"), call again with mode="fresh".

  ## Step 2 — Review, don't recompute
  The ratings are already deterministic and computed server-side. Sanity-check
  each rating against its evidence numbers (e.g. overdueCount = 0 should not
  be Red) and flag any contradiction rather than silently overriding it.
  Surface every entry in dataGaps to the user.

  ## Step 3 — Present the draft
  For each of the five dimensions plus Overall, show the colour and one line
  citing the actual evidence numbers from the response — never a vague
  adjective. Then Highlights (from strong evidence), Lowlights (from
  dataGaps, topRisks, overdue evidence), and Next period (from
  timeline.nextMilestoneDate). If trend.hasPriorReport is true, note any
  dimension that moved since the last report.

  ## Step 4 — Save on explicit approval
  Ask: "Shall I save this as a status report record in xPM?" and wait. Only
  on an unambiguous "yes", create one pum_statusreportings row via the
  Dataverse MCP create_record tool using the ratingInt values straight from
  the fetch response (see the status-report-drafter skill for the exact
  field mapping — pum_statusdate, pum_kpinew*, pum_comment, per-dimension
  pum_kpinew*comment fields; there are no pum_highlights/pum_lowlights/
  pum_nextperiodplan fields). Never set pum_kpicurrent* fields.

  ## Step 5 — Invite refinement
  After presenting (before or after saving), invite refinement: "Make the
  timeline section shorter", "Add a note about the budget conversation",
  "Rewrite this more formally for the steering committee". Apply changes to
  the presented text directly — do not re-run the fetch tool unless the user
  asks for fresh data.

  ## Rules
    - Be direct. No generic project management advice.
    - Never invent a rating or number not present in the fetch response.
    - Never call read_query/list_rows against pum_gantttasks, pum_risks,
      pum_pf_powerfinancialsdatas, pum_proposes, pum_commits, or
      pum_statusreportings for this task — the fetch tool already did it.
      Dataverse MCP is only for the approval-gated save in Step 4 and for
      ad-hoc questions the fetch tool doesn't answer.

tools:
  - name: pum_skill_fetch_status_data
    displayName: FetchStatusData
    type: powerAutomateFlow
    description: >-
      Fetches and deterministically rates all 5 status-report dimensions
      (Timeline, Financials, Scope, Quality, Resources) plus Overall for one
      xPM initiative in a single call. Always use this for status-report
      data instead of Dataverse read_query/list_rows.
    flow:
      name: pum_skill_fetch_status_data
      solution: XPMCopilotSkills
    inputSchema:
      type: object
      required: ["initiativeId"]
      properties:
        initiativeId:
          type: string
          description: GUID of the pum_Initiative to compute a status report for.
        mode:
          type: string
          description: >-
            "auto" (default) returns a cached draft if fresh; "fresh" forces
            a live recompute. Reserved — the current flow version always
            computes fresh; caching lands in a later phase.
    outputSchema:
      type: object
      properties:
        initiativeId:
          type: string
          description: Echo of the requested initiative GUID.
        initiativeName:
          type: string
          description: Initiative display name.
        currentPhase:
          type: string
          description: Current BPF stage / phase name.
        computedOn:
          type: string
          description: UTC timestamp this data was computed.
        source:
          type: string
          description: "'fresh' or 'cache' — which path produced this response."
        timeline:
          type: object
          description: >-
            Schedule dimension: rating, ratingInt, incompleteCount,
            overdueCount, worstOverdueDays, nextMilestoneDate.
        financials:
          type: object
          description: >-
            Financials dimension: rating, ratingInt, hasData, budget,
            actuals, forecast, variancePct.
        scope:
          type: object
          description: >-
            Scope dimension: rating, ratingInt, openRiskCount, highRiskCount,
            openChangeRequestCount, topRisks array (name, probability,
            impact, dueDate).
        quality:
          type: object
          description: >-
            Quality dimension: rating, ratingInt, qualityLessonCount,
            qualityRiskCount.
        resources:
          type: object
          description: >-
            Resources dimension: rating, ratingInt, hasData, proposedHours,
            committedHours, gapHours, gapPct.
        overall:
          type: object
          description: Derived overall rating: rating, ratingInt.
        trend:
          type: object
          description: >-
            Prior report context: hasPriorReport, priorReportDate,
            priorSummaryRating, priorComment.
        dataGaps:
          type: array
          description: >-
            Human-readable notes about any dimension rated N/A or
            Green-by-absence-of-data. Empty array if none.

knowledge: []
topics: []
