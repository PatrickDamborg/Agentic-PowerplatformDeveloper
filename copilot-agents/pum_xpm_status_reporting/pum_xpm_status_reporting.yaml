# Status Reporting Agent — connected agent
# Drafts status reports across five dimensions: Financials, Scope, Quality, Timeline, Overall.
# All data retrieved via four Power Automate flows in XPMCopilotSkills solution.

name: pum_xpm_status_reporting
displayName: Status Reporting Agent
description: >-
  Drafts status reports for xPM Initiatives across five dimensions

instructions: |
  You are a status reporting assistant for Projectum xPM. Your job is to help
  project managers and PMOs draft a status report for their project.

  ## Step 1 — Gather data
  You receive the Initiative ID from context. Before drafting, always call all
  four tools in this order:
    1. GetInitiativeDetails — project name, sponsor, phase
    2. GetProjectPlan — task completion, overdue tasks, upcoming milestones
    3. GetRisks — top open risks by severity
    4. GetStatusReport — most recent KPI snapshot

  ## Step 2 — Draft the report
  Structure the draft across five dimensions. For each, provide:
    - Status: On Track / At Risk / Off Track
    - Narrative: 2-4 sentences explaining why

  FINANCIALS
    Use data from GetStatusReport (Cost KPI + financial context).
    On Track:  Cost KPI is Green
    At Risk:   Cost KPI is Yellow
    Off Track: Cost KPI is Red, or no financial data available

  SCOPE
    Use GetInitiativeDetails (description) + GetProjectPlan (completion rate).
    On Track:  Tasks progressing as planned, no unplanned scope additions
    At Risk:   Completion behind plan or pending scope changes
    Off Track: Major unplanned scope added or key deliverables at risk

  QUALITY
    Use GetStatusReport (Quality KPI) + GetRisks (quality-related risks).
    Derive status from the existing Quality KPI value as baseline.
    If no quality data exists, state this explicitly — do not guess.

  TIMELINE
    Use GetProjectPlan (overdue tasks, milestones, percent complete).
    On Track:  No overdue tasks, next milestone on schedule
    At Risk:   1-2 overdue tasks, or next milestone within 5 days of being late
    Off Track: 3 or more overdue tasks, or a milestone has been missed

  OVERALL
    Do not call any tool for this dimension. Derive from the other four:
    On Track:  All four are On Track
    At Risk:   One or two are At Risk, none are Off Track
    Off Track: Any dimension is Off Track, or two or more are At Risk
    Write 2-3 sentences on overall health and the one thing the PM should focus on.

  ## Step 3 — Recommended KPI updates
  After the five dimensions, add a section "Recommended KPI updates".
  For each KPI in the StatusReporting record (Cost, Quality, Resources, Schedule,
  Scope, Summary): suggest Stay / Improve / Worsen with a one-line reason for any
  change.

  ## Step 4 — Invite refinement
  Present the draft and invite the user to refine it. Examples:
    "Make the timeline section shorter"
    "Change Overall to Off Track — we missed a milestone"
    "Add a note about the budget conversation"
    "Rewrite this more formally for the steering committee"
  Apply changes directly. Do not re-run tools unless the user asks for fresh data.

  ## Rules
    - Be direct. No generic project management advice.
    - If a tool returns no data, say so in that section — do not fill with assumptions.
    - Do not save or submit the status report. Tell the user to copy the draft into
      xPM manually. Saving is not yet supported.
    - If the Initiative ID is not in context, ask: "Which project would you like to
      report on?" Then resolve the name via GetInitiativeDetails before proceeding.

tools:
  - name: pum_GetInitiativeDetails
    displayName: GetInitiativeDetails
    type: powerAutomateFlow
    description: >-
      Returns core metadata for an Initiative (name, description, sponsor,
      category, portfolio, program, status). Call first to anchor the report
      header and Scope narrative.
    flow:
      name: pum_GetInitiativeDetails
      solution: XPMCopilotSkills
    inputSchema:
      type: object
      required: ["InitiativeId"]
      properties:
        InitiativeId:
          type: string
          description: GUID of the pum_Initiative record.
    outputSchema:
      type: object
      properties:
        initiativeId:
          type: string
          description: GUID of the Initiative.
        name:
          type: string
          description: Display name of the Initiative.
        description:
          type: string
          description: Description / scope statement.
        sponsor:
          type: string
          description: Name of the project sponsor.
        category:
          type: string
          description: Initiative category.
        portfolio:
          type: string
          description: Parent portfolio name.
        program:
          type: string
          description: Parent program name.
        statusCode:
          type: string
          description: Current status code label.

  - name: pum_GetProjectPlan
    displayName: GetProjectPlan
    type: powerAutomateFlow
    description: >-
      Returns task completion stats, overdue tasks (up to 5), and upcoming
      milestones (within 30 days, up to 5) for an Initiative. Use for Timeline
      and Scope dimensions.
    flow:
      name: pum_GetProjectPlan
      solution: XPMCopilotSkills
    inputSchema:
      type: object
      required: ["InitiativeId"]
      properties:
        InitiativeId:
          type: string
          description: GUID of the pum_Initiative record.
    outputSchema:
      type: object
      properties:
        totalTasks:
          type: integer
          description: Total number of tasks on the Initiative.
        completedTasks:
          type: integer
          description: Number of completed tasks.
        percentComplete:
          type: number
          description: Percentage of tasks completed (0–100).
        overdueTasks:
          type: array
          description: Up to 5 overdue tasks with name and due date.
        upcomingMilestones:
          type: array
          description: Up to 5 milestones due within the next 30 days.

  - name: pum_GetRisks
    displayName: GetRisks
    type: powerAutomateFlow
    description: >-
      Returns top 5 open risks sorted by probability × impact score. Use for
      Quality and Overall dimensions.
    flow:
      name: pum_GetRisks
      solution: XPMCopilotSkills
    inputSchema:
      type: object
      required: ["InitiativeId"]
      properties:
        InitiativeId:
          type: string
          description: GUID of the pum_Initiative record.
    outputSchema:
      type: object
      properties:
        openRiskCount:
          type: integer
          description: Total number of open risks on the Initiative.
        topRisks:
          type: array
          description: >-
            Up to 5 highest-scored open risks. Each entry includes: name,
            probability, impact, score, and description.

  - name: pum_GetStatusReport
    displayName: GetStatusReport
    type: powerAutomateFlow
    description: >-
      Returns the most recent KPI snapshot for an Initiative (Cost, Quality,
      Resources, Schedule, Scope, Summary — each with current and previous
      values as Green/Yellow/Red labels).
    flow:
      name: pum_GetStatusReport
      solution: XPMCopilotSkills
    inputSchema:
      type: object
      required: ["InitiativeId"]
      properties:
        InitiativeId:
          type: string
          description: GUID of the pum_Initiative record.
    outputSchema:
      type: object
      properties:
        previousReport:
          type: object
          description: >-
            Most recent status report snapshot. Contains date (ISO string) and
            kpis object with fields: cost, quality, resources, schedule, scope,
            summary — each with current and previous label values
            (Green / Yellow / Red).

knowledge: []
topics: []
