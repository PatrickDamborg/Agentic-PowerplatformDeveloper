mcs.metadata:
  componentName: GenerateTrainingProgramme
  description: Generates a personalised training programme using the user's profile details and fitness knowledge.
kind: AdaptiveDialog
modelDisplayName: Generate Training Programme
modelDescription: Use this topic when the user wants to generate, design, or build their personalised training programme or workout plan. Collects profile details and creates an AI-designed programme with exercises, sets, reps, and coaching notes.
inputs:
  - kind: AutomaticTaskInput
    propertyName: profileName
    description: The name on the user's training profile that will be used to personalise the programme.
    entity: StringPrebuiltEntity
    shouldPromptUser: true

  - kind: AutomaticTaskInput
    propertyName: userGoals
    description: The user's fitness goals, for example losing weight, building strength, or running a 5K.
    entity: StringPrebuiltEntity
    shouldPromptUser: true

  - kind: AutomaticTaskInput
    propertyName: userAge
    description: The user's age in years.
    entity: NumberPrebuiltEntity
    shouldPromptUser: true

  - kind: AutomaticTaskInput
    propertyName: userWeightKg
    description: The user's current body weight in kilograms.
    entity: NumberPrebuiltEntity
    shouldPromptUser: true

  - kind: AutomaticTaskInput
    propertyName: userHeightCm
    description: The user's height in centimetres.
    entity: NumberPrebuiltEntity
    shouldPromptUser: true

  - kind: AutomaticTaskInput
    propertyName: userInjuries
    description: Any injuries or physical limitations the user has.
    entity: StringPrebuiltEntity
    shouldPromptUser: true

  - kind: AutomaticTaskInput
    propertyName: userPreferences
    description: Any equipment preferences, preferred workout days, or other relevant training details.
    entity: StringPrebuiltEntity
    shouldPromptUser: true

inputType:
  properties:
    profileName:
      displayName: Profile Name
      description: The name on the user's training profile.
      type: String
    userGoals:
      displayName: Fitness Goals
      description: The user's fitness goals.
      type: String
    userAge:
      displayName: Age
      description: Age in years.
      type: Number
    userWeightKg:
      displayName: Weight (kg)
      description: Current body weight in kilograms.
      type: Number
    userHeightCm:
      displayName: Height (cm)
      description: Height in centimetres.
      type: Number
    userInjuries:
      displayName: Injuries or Limitations
      description: Any injuries, pain points, or physical limitations.
      type: String
    userPreferences:
      displayName: Preferences
      description: Equipment preferences, preferred workout days, or other relevant details.
      type: String

beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Generate Training Programme
    triggerQueries:
      - generate my training programme
      - design my training plan
      - create a programme
      - build my workout plan
      - generate programme

  actions:
    - kind: Question
      id: question_profileName_gp01
      variable: init:Topic.profileName
      prompt: "What is your name? I'll use this to personalise your training programme."
      entity: StringPrebuiltEntity
      alwaysPrompt: true
      interruptionPolicy:
        allowInterruption: false

    - kind: Question
      id: question_goals_gp02
      variable: init:Topic.userGoals
      prompt: "What are your main fitness goals? (e.g. lose weight, build strength, run a 5K)"
      entity: StringPrebuiltEntity
      alwaysPrompt: true
      interruptionPolicy:
        allowInterruption: false

    - kind: Question
      id: question_age_gp03
      variable: init:Topic.userAge
      prompt: "How old are you?"
      entity: NumberPrebuiltEntity
      alwaysPrompt: true
      interruptionPolicy:
        allowInterruption: false

    - kind: Question
      id: question_weight_gp04
      variable: init:Topic.userWeightKg
      prompt: "What is your current weight in kilograms?"
      entity: NumberPrebuiltEntity
      alwaysPrompt: true
      interruptionPolicy:
        allowInterruption: false

    - kind: Question
      id: question_height_gp05
      variable: init:Topic.userHeightCm
      prompt: "What is your height in centimetres?"
      entity: NumberPrebuiltEntity
      alwaysPrompt: true
      interruptionPolicy:
        allowInterruption: false

    - kind: Question
      id: question_injuries_gp06
      variable: init:Topic.userInjuries
      prompt: "Do you have any injuries, pain points, or physical limitations I should take into account? (Type 'none' if not applicable)"
      entity: StringPrebuiltEntity
      alwaysPrompt: true
      interruptionPolicy:
        allowInterruption: false

    - kind: Question
      id: question_preferences_gp07
      variable: init:Topic.userPreferences
      prompt: "Any equipment preferences, preferred workout days, or other relevant details?"
      entity: StringPrebuiltEntity
      alwaysPrompt: true
      interruptionPolicy:
        allowInterruption: false

    - kind: SendActivity
      id: sendMessage_generating_gp08
      activity:
        text:
          - "Great! Let me design your personalised training programme now. This will take a moment..."

    - kind: AnswerQuestionWithAI
      id: genProgramme_gp09
      displayName: Generate Programme Plan
      userInput: ="Based on the following training profile, design a complete personalised 12-week training programme. Profile: Name={Topic.profileName}, Age={Topic.userAge}, Weight={Topic.userWeightKg}kg, Height={Topic.userHeightCm}cm, Goals={Topic.userGoals}, Injuries/Limitations={Topic.userInjuries}, Preferences={Topic.userPreferences}. Provide: (1) A programme name, (2) An overall programme summary describing the training approach and philosophy, (3) A 3-day-per-week exercise schedule for Week 1 showing: Day, Exercise name, Sets x Reps, Weight/Intensity guidance, Rest period in seconds, and coaching notes for each exercise. Focus on progressive overload principles and the user's specific goals. Format the schedule clearly."
      variable: init:Topic.programmePlan
      autoSend: false

    - kind: SendActivity
      id: sendMessage_confirm_gp10
      activity:
        text:
          - "Your personalised training programme is ready, {Topic.profileName}!\n\n{Topic.programmePlan}\n\nWould you like to start a weekly check-in after your first week to track progress and adjust the programme?"
